<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TR:EDIT | Console Panel</title>
<style>
	@font-face {
		font-family: 'TypeRig Icons';
		src: url('typerig-icons.ttf') format('truetype');
		font-weight: normal;
		font-style: normal;
		font-feature-settings: 'rlig' 1;
	}

	:root {
		--bg-primary: #1a1a1e;
		--bg-secondary: #222226;
		--bg-tertiary: #2a2a2e;
		--bg-hover: #2e2e34;
		--text-primary: #e8e8ec;
		--text-secondary: #a8a8b0;
		--text-dim: #666670;
		--border: #333338;
		--border-subtle: #2a2a30;
		--accent: #5b9def;
		--accent-dim: #3a5a8a;
		--accent-bg: rgba(91,157,239,0.12);
		--error-bg: rgba(220,60,60,0.08);
		--error-border: rgba(220,60,60,0.25);
	}

	* { margin: 0; padding: 0; box-sizing: border-box; }

	body {
		background: var(--bg-primary);
		color: var(--text-primary);
		font-family: 'DM Sans', 'Inter', 'Segoe UI', sans-serif;
		height: 100vh;
		display: flex;
		flex-direction: column;
		overflow: hidden;
	}

	/* -- Header --------------------------------------------------- */
	#panel-header {
		display: flex;
		align-items: center;
		gap: 8px;
		padding: 6px 12px;
		background: var(--bg-secondary);
		border-bottom: 1px solid var(--border);
	}

	#panel-header .logo {
		font-family: 'JetBrains Mono', monospace;
		font-weight: 600;
		font-size: 11px;
		color: var(--accent);
		letter-spacing: 0.5px;
	}

	.panel-tab {
		padding: 4px 10px;
		background: transparent;
		border: 1px solid transparent;
		border-radius: 4px;
		color: var(--text-dim);
		font-family: 'DM Sans', sans-serif;
		font-size: 12px;
		cursor: pointer;
	}

	.panel-tab:hover { color: var(--text-secondary); }
	.panel-tab.active {
		background: var(--accent-bg);
		color: var(--accent);
		border-color: var(--accent-dim);
	}

	.panel-info {
		margin-left: auto;
		font: 10px 'JetBrains Mono', monospace;
		color: var(--text-dim);
	}

	.parse-status { padding: 1px 6px; border-radius: 3px; font-size: 10px; }
	.parse-status.ok { background: rgba(80,200,120,0.15); color: #50c878; }
	.parse-status.error { background: rgba(220,60,60,0.15); color: #dc3c3c; }

	#glyph-label {
		font: 11px 'JetBrains Mono', monospace;
		color: var(--text-secondary);
		margin-left: 8px;
	}

	/* -- Content -------------------------------------------------- */
	#panel-body {
		flex: 1;
		display: flex;
		flex-direction: column;
		overflow: hidden;
	}

	.panel-content {
		display: none;
		flex: 1;
		flex-direction: column;
		overflow: hidden;
	}

	.panel-content.active {
		display: flex;
	}

	/* -- XML tab -------------------------------------------------- */
	#xml-actions {
		display: flex;
		gap: 6px;
		padding: 6px 8px;
		border-bottom: 1px solid var(--border-subtle);
	}

	.xml-btn {
		display: inline-flex;
		align-items: center;
		gap: 4px;
		padding: 4px 10px;
		background: var(--bg-tertiary);
		border: 1px solid var(--border);
		border-radius: 4px;
		color: var(--text-secondary);
		font: 12px 'DM Sans', sans-serif;
		cursor: pointer;
	}

	.xml-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
	.xml-btn--primary { border-color: var(--accent-dim); color: var(--accent); }
	.xml-btn--primary:hover { background: var(--accent-bg); }

	.tri {
		font-family: 'TypeRig Icons';
		font-size: 14px;
		line-height: 1;
		font-style: normal;
		font-weight: normal;
	}

	#xml-content {
		flex: 1;
		background: var(--bg-primary);
		color: var(--text-primary);
		border: none;
		padding: 8px;
		font: 11px/1.65 'JetBrains Mono', monospace;
		resize: none;
		outline: none;
		tab-size: 2;
		overflow: auto;
	}

	#xml-content.has-error {
		background: var(--error-bg);
		border-left: 2px solid var(--error-border);
	}

	/* -- Python tab ----------------------------------------------- */
	#py-output {
		flex: 1;
		overflow-y: auto;
		padding: 8px;
		font: 11px/1.5 'JetBrains Mono', monospace;
		color: var(--text-secondary);
		white-space: pre-wrap;
		word-break: break-all;
	}

	#py-input-wrap {
		border-top: 1px solid var(--border);
		padding: 6px 8px;
	}

	#py-input {
		width: 100%;
		background: var(--bg-tertiary);
		color: var(--text-primary);
		border: 1px solid var(--border);
		border-radius: 4px;
		padding: 6px 8px;
		font: 11px/1.4 'JetBrains Mono', monospace;
		resize: vertical;
		min-height: 28px;
		outline: none;
	}

	#py-input:focus { border-color: var(--accent-dim); }

	#py-input-actions {
		display: flex;
		align-items: center;
		gap: 6px;
		margin-top: 4px;
	}

	.py-btn {
		padding: 3px 8px;
		background: var(--bg-tertiary);
		border: 1px solid var(--border);
		border-radius: 4px;
		color: var(--text-secondary);
		font: 11px 'DM Sans', sans-serif;
		cursor: pointer;
	}
	.py-btn:hover { background: var(--bg-hover); }
	.py-btn--primary { border-color: var(--accent-dim); color: var(--accent); }

	.hint {
		font: 10px 'JetBrains Mono', monospace;
		color: var(--text-dim);
		margin-left: auto;
	}

	/* -- Disconnected overlay ------------------------------------- */
	#disconnected {
		display: none;
		position: fixed;
		inset: 0;
		background: rgba(0,0,0,0.7);
		z-index: 100;
		justify-content: center;
		align-items: center;
	}

	#disconnected.visible { display: flex; }

	#disconnected .msg {
		background: var(--bg-secondary);
		border: 1px solid var(--border);
		border-radius: 8px;
		padding: 24px 32px;
		text-align: center;
		color: var(--text-secondary);
		font: 13px 'DM Sans', sans-serif;
	}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="panel-header">
	<span class="logo">TR:GLYPH</span>
	<span id="glyph-label"></span>
	<button class="panel-tab active" data-panel="xml">XML</button>
	<button class="panel-tab" data-panel="python">Python</button>
	<span class="panel-info">
		<span id="node-count"></span>
		<span class="parse-status ok" id="parse-status">OK</span>
	</span>
</div>

<div id="panel-body">
	<!-- XML tab -->
	<div id="xml-tab" class="panel-content active">
		<div id="xml-actions">
			<button class="xml-btn" id="xml-refresh-btn"><span class="tri">refresh</span> Refresh</button>
			<button class="xml-btn xml-btn--primary" id="xml-apply-btn"><span class="tri">action_play</span> Apply</button>
		</div>
		<textarea id="xml-content" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
	</div>

	<!-- Python tab (placeholder — full Pyodide not loaded here) -->
	<div id="python-tab" class="panel-content">
		<div id="py-output">Python REPL is available in the main window only.\nThis tab is reserved for future detached REPL support.</div>
		<div id="py-input-wrap">
			<textarea id="py-input" rows="1" disabled placeholder="Python not available in detached mode" spellcheck="false"></textarea>
			<div id="py-input-actions">
				<span class="hint">Detached mode</span>
			</div>
		</div>
	</div>
</div>

<div id="disconnected">
	<div class="msg">Main window closed.<br>This panel will close automatically.</div>
</div>

<script>
'use strict';

var CHANNEL_NAME = 'trv-panel-bridge';
var channel = null;
var xmlContent = document.getElementById('xml-content');
var nodeCount = document.getElementById('node-count');
var parseStatus = document.getElementById('parse-status');
var glyphLabel = document.getElementById('glyph-label');

// -- Line maps for selection highlighting ---------------------------
var xmlLineNodeMap = {};
var xmlNodeLineMap = {};

function rebuildLineMaps(text) {
	xmlLineNodeMap = {};
	xmlNodeLineMap = {};
	var lines = text.split('\n');
	var globalContourIdx = 0, nodeIdx = 0, inContour = false;
	for (var i = 0; i < lines.length; i++) {
		var line = lines[i].trim();
		if (line.startsWith('<contour')) { inContour = true; nodeIdx = 0; }
		else if (line === '</contour>') { if (inContour) globalContourIdx++; inContour = false; }
		else if (inContour && line.startsWith('<node ')) {
			var id = 'c' + globalContourIdx + '_n' + nodeIdx;
			xmlLineNodeMap[i] = id;
			xmlNodeLineMap[id] = i;
			nodeIdx++;
		}
	}
}

function highlightNode(nodeId) {
	var lineIdx = xmlNodeLineMap[nodeId];
	if (lineIdx === undefined) return;
	var text = xmlContent.value;
	var lines = text.split('\n');
	var charStart = 0;
	for (var i = 0; i < lineIdx; i++) charStart += lines[i].length + 1;
	var charEnd = charStart + (lines[lineIdx] || '').length;
	xmlContent.focus();
	xmlContent.setSelectionRange(charStart, charEnd);
	var lineHeight = 11 * 1.65;
	xmlContent.scrollTop = Math.max(0, lineIdx * lineHeight - xmlContent.clientHeight / 2);
}

// -- BroadcastChannel -----------------------------------------------
try {
	channel = new BroadcastChannel(CHANNEL_NAME);
} catch (e) {
	// file:// protocol fallback - try opener
	console.warn('BroadcastChannel not available, falling back to opener');
}

function send(msg) {
	if (channel) {
		channel.postMessage(msg);
	} else if (window.opener) {
		window.opener.postMessage(msg, '*');
	}
}

function onMessage(msg) {
	if (msg.type === 'stateUpdate') {
		xmlContent.value = msg.xml || '';
		rebuildLineMaps(msg.xml || '');
		glyphLabel.textContent = msg.glyphName + (msg.activeLayer ? ' / ' + msg.activeLayer : '');
		if (msg.nodeCount) {
			nodeCount.textContent = msg.nodeCount.on + ' on / ' + msg.nodeCount.off + ' off';
		}
		parseStatus.textContent = 'OK';
		parseStatus.className = 'parse-status ok';
		xmlContent.classList.remove('has-error');
	} else if (msg.type === 'selectionChanged') {
		if (msg.ids && msg.ids.length > 0) highlightNode(msg.ids[0]);
	}
}

if (channel) {
	channel.onmessage = function(e) { onMessage(e.data); };
}

// file:// fallback
window.addEventListener('message', function(e) {
	if (e.data && e.data.type) onMessage(e.data);
});

// Notify main window we're ready
send({ type: 'panelReady' });

// -- Refresh / Apply buttons ----------------------------------------
document.getElementById('xml-refresh-btn').addEventListener('click', function() {
	send({ type: 'xmlRefresh' });
});

document.getElementById('xml-apply-btn').addEventListener('click', function() {
	send({ type: 'xmlApply', xml: xmlContent.value });
});

// Ctrl+Enter in textarea → Apply
xmlContent.addEventListener('keydown', function(e) {
	if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
		e.preventDefault();
		send({ type: 'xmlApply', xml: xmlContent.value });
	}
});

// -- Tab switching --------------------------------------------------
var tabs = document.querySelectorAll('.panel-tab');
for (var i = 0; i < tabs.length; i++) {
	tabs[i].addEventListener('click', function() {
		for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
		this.classList.add('active');
		var panel = this.dataset.panel;
		document.getElementById('xml-tab').classList.toggle('active', panel === 'xml');
		document.getElementById('python-tab').classList.toggle('active', panel === 'python');
	});
}

// -- Connection monitoring ------------------------------------------
var checkInterval = setInterval(function() {
	// If opened via window.open, check if opener is gone
	if (window.opener && window.opener.closed) {
		document.getElementById('disconnected').classList.add('visible');
		clearInterval(checkInterval);
		setTimeout(function() { window.close(); }, 2000);
	}
}, 1000);

// -- Notify on close ------------------------------------------------
window.addEventListener('beforeunload', function() {
	send({ type: 'panelClosed' });
});
</script>
</body>
</html>
